# lighthouserc.yml
# Lighthouse CI configuration.
# Place at the project root and run via: npx lhci autorun
#
# Required CI steps before running:
#   1. npm run build
#   2. npm run preview (or serve the dist/ folder)
#   3. npx lhci autorun
#
# Adjust minScore thresholds to match your project's agreed SLAs.

ci:
  collect:
    # URL(s) to audit — update the port to match your preview server
    url:
      - "http://localhost:4173"
      - "http://localhost:4173/dashboard"   # Add key routes for better coverage
    # Run 3 times and take the median to reduce noise
    numberOfRuns: 3
    # Runs a local Lighthouse server against the preview build
    startServerCommand: "npm run preview"
    startServerReadyPattern: "Local:"
    startServerReadyTimeout: 10000

  assert:
    # "error" = fail the CI build. "warn" = log but don't fail.
    assertions:
      # Core categories — adjust minScore per project SLA
      categories:performance:
        - error
        - { minScore: 0.9 }
      categories:accessibility:
        - error
        - { minScore: 1.0 }     # Accessibility must be perfect
      categories:best-practices:
        - error
        - { minScore: 0.9 }
      categories:seo:
        - error
        - { minScore: 0.9 }

      # Core Web Vitals — unit: milliseconds
      largest-contentful-paint:
        - error
        - { maxNumericValue: 2500 }    # < 2.5s = Good
      cumulative-layout-shift:
        - error
        - { maxNumericValue: 0.1 }     # < 0.1 = Good
      total-blocking-time:
        - warn
        - { maxNumericValue: 200 }     # Proxy for INP

      # No render-blocking resources
      render-blocking-resources:
        - warn
        - { maxLength: 0 }

  upload:
    # Stores reports temporarily (7-day expiry). Set to "lhci" for a self-hosted server.
    target: temporary-public-storage
